<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vertebrates and Invertebrates Game</title>

    <link rel="stylesheet" href="../assets/css/junior-games.css">

</head>

<body>

<header class="junior-header">

<h1 class="junior-h1">
Vertebrates and Invertebrates
</h1>

<a class="junior-anchor" href="../index.html">Homepage</a>

<a class="junior-anchor" href="index.html">Games</a>

</header>

<p class="junior-para">
Drag each animal into the correct group.
</p>

<h2 id="score">
Score : 0 / 8
</h2>

<div class="classify-container">

    <!-- Vertebrates -->

    <div class="category">

        <h2 class="category-title">
            Vertebrates
        </h2>

        <div class="drop-zone big-zone"
             data-group="vertebrates">

        </div>

    </div>


    <!-- Invertebrates -->

    <div class="category">

        <h2 class="category-title">
            Invertebrates
        </h2>

        <div class="drop-zone big-zone"
             data-group="invertebrates">

        </div>

    </div>

</div>


<h2 class="drag-title">
Drag the Animals
</h2>

<div class="drag-container">

    <div class="drag-item"
         draggable="true"
         data-group="vertebrates">

        Lion

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="invertebrates">

        Butterfly

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="vertebrates">

        Cow

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="invertebrates">

        Earthworm

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="vertebrates">

        Duck

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="invertebrates">

        Spider

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="vertebrates">

        Elephant

    </div>

    <div class="drag-item"
         draggable="true"
         data-group="invertebrates">

        Octopus

    </div>

</div>

<h2 id="message"></h2>


<audio id="correctSound">
    <source src="../assets/sounds/correct.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound">
    <source src="../assets/sounds/wrong.mp3" type="audio/mpeg">
</audio>

<audio id="winSound">
    <source src="../assets/sounds/win.mp3" type="audio/mpeg">
</audio>

<script src="../assets/javascript/junior-games-sort.js"></script>

</body>

</html>
