<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitats Game</title>

    <link rel="stylesheet" href="../assets/css/junior-games.css">
</head>

<body>

    <header class="junior-header">
        <h1 class="junior-h1">Match each animals to its correct habitats</h1>

        <a class="junior-anchor" href="../../index.html">Homepage</a>
        <a class="junior-anchor" href="index.html">Games</a>
    </header>

    <p class="junior-para">
        Drag the correct habitat onto each picture.
    </p>

    <h2 id="score">Score : 0 / 6</h2>

    <div class="junior-container">

        <!-- Camel -->
        <div class="junior-div">
            <img src="../assets/images/animals/camel-desert.jpg" alt="Camel"
                class="junior-image">

            <div class="drop-zone"
                data-answer="desert">
                Drop Here
            </div>
        </div>

        <!-- Polar Bear -->
        <div class="junior-div">
            <img src="../assets/images/animals/polarbear-polarregion.jpg" alt="Polar Bear"
                class="junior-image">

            <div class="drop-zone"
                data-answer="polar-region">
                Drop Here
            </div>
        </div>

        <!-- Whale -->
        <div class="junior-div">
            <img src="../assets/images/animals/whale-ocean.jpg" alt="Whale"
                class="junior-image">

            <div class="drop-zone"
                data-answer="ocean">
                Drop Here
            </div>
        </div>

        <!-- Monkey -->
        <div class="junior-div">
            <img src="../assets/images/animals/monkey-forest.jpg" alt="Monkey"
                class="junior-image">

            <div class="drop-zone"
                data-answer="forest">
                Drop Here
            </div>
        </div>

        <!-- Giraffe -->
        <div class="junior-div">
            <img src="../assets/images/animals/giraffe-grassland.jpg" alt="Giraffe"
                class="junior-image">

            <div class="drop-zone"
                data-answer="grassland">
                Drop Here
            </div>
        </div>

        <!-- Mountain Goat -->
        <div class="junior-div">
            <img src="../assets/images/animals/mountaingoat-mountains.jpg" alt="Goat"
                class="junior-image">

            <div class="drop-zone"
                data-answer="mountains">
                Drop Here
            </div>
        </div>

    </div>

    <h2 class="drag-title">
        Drag These Habitats
    </h2>

    <div class="drag-container">

        <div class="drag-item"
            draggable="true"
            data-name="desert">
            Desert
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="polar-region">
            Polar region
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="ocean">
            Ocean
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="forest">
            Forest
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="grassland">
            Grassland
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="mountains">
            Mountains
        </div>

    </div>

    <h2 id="message"></h2>

    <!-- Sounds -->
    <audio id="correctSound">
        <source src="../assets/sounds/correct.mp3" type="audio/mpeg">
    </audio>

    <audio id="wrongSound">
        <source src="../assets/sounds/wrong.mp3" type="audio/mpeg">
    </audio>

    <audio id="winSound">
        <source src="../assets/sounds/win.mp3" type="audio/mpeg">
    </audio>

    <script src="../assets/javascript/general-games-match.js"></script>

</body>

</html>
