
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Home Game</title>

    <link rel="stylesheet" href="../assets/css/tiny-games.css">
</head>

<body class="tiny-game">

    <header class="tiny-header">
        <h1 class="tiny-h1">Match the Animal to its Home</h1>

        <a class="tiny-anchor" href="../../index.html">Homepage</a>
        <a class="tiny-anchor" href="index.html">Games</a>
    </header>

    <p class="tiny-para">
        Drag the correct home onto each picture.
    </p>

    <h2 id="score">Score : 0 / 6</h2>

    <div class="tiny-container">

        <!-- Lion -->
        <div class="tiny-div">
            <img src="../assets/images/animals/den.png" alt="Lion"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="den">
                Drop Here
            </div>
        </div>

        <!-- Elephant -->
        <div class="tiny-div">
            <img src="../assets/images/animals/forest.png" alt="Elephant"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="forest">
                Drop Here
            </div>
        </div>

        <!-- Cow -->
        <div class="tiny-div">
            <img src="../assets/images/animals/shed.png" alt="Cow"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="shed">
                Drop Here
            </div>
        </div>

        <!-- Dog -->
        <div class="tiny-div">
            <img src="../assets/images/animals/kennel.png" alt="Dog"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="kennel">
                Drop Here
            </div>
        </div>

        <!-- Duck -->
        <div class="tiny-div">
            <img src="../assets/images/animals/pond.png" alt="Duck"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="pond">
                Drop Here
            </div>
        </div>

        <!-- Owl -->
        <div class="tiny-div">
            <img src="../assets/images/animals/tree-hole.png" alt="Owl"
                class="tiny-image">

            <div class="drop-zone"
                data-answer="tree-hole">
                Drop Here
            </div>
        </div>

    </div>

    <h2 class="drag-title">
        Drag These Homes
    </h2>

    <div class="drag-container">

        <div class="drag-item"
            draggable="true"
            data-name="den">
            Den
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="forest">
            Forest
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="shed">
            Shed
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="kennel">
            Kennel
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="pond">
            Pond
        </div>

        <div class="drag-item"
            draggable="true"
            data-name="tree-hole">
            Tree hole
        </div>

    </div>

    <h2 id="message"></h2>

    <!-- Sounds -->
    <audio id="correctSound">
        <source src="../assets/sounds/correct.mp3" type="audio/mpeg">
    </audio>

    <audio id="wrongSound">
        <source src="../assets/sounds/wrong.mp3" type="audio/mpeg">
    </audio>

    <audio id="winSound">
        <source src="../assets/sounds/win.mp3" type="audio/mpeg">
    </audio>

    <script src="../assets/javascript/general-games-match.js"></script>

</body>

</html>
